name: ChildishIDE
options:
  bundleIdPrefix: com.childish
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  ChildishIDE:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/ChildishIDE
        excludes:
          - Resources
    resources:
      - path: Sources/ChildishIDE/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.childish.ChildishIDE
        PRODUCT_NAME: ChildishIDE
        INFOPLIST_FILE: Sources/ChildishIDE/Resources/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Sources/ChildishIDE/Resources/Info.plist

schemes:
  ChildishIDE:
    build:
      targets:
        ChildishIDE: all
    run:
      config: Debug
    archive:
      config: Release
